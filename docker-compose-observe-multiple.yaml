x-gpt2giga-common: &gpt2giga-common
  image: ghcr.io/ai-forever/gpt2giga:latest
  restart: unless-stopped
  env_file:
    - .env
  depends_on:
    - mitmproxy

services:
  gpt2giga-lite:
    <<: *gpt2giga-common
    container_name: gpt2giga_lite
    environment:
      GIGACHAT_MODEL: GigaChat-2
      GPT2GIGA_PORT: 8090
      HTTP_PROXY: http://mitmproxy:8080
      HTTPS_PROXY: http://mitmproxy:8080
    ports:
      - "8090:8090"

  gpt2giga-pro:
    <<: *gpt2giga-common
    container_name: gpt2giga_pro
    environment:
      GIGACHAT_MODEL: GigaChat-2-Pro
      GPT2GIGA_PORT: 8090
      HTTP_PROXY: http://mitmproxy:8080
      HTTPS_PROXY: http://mitmproxy:8080
    ports:
      - "8091:8090"

  gpt2giga-max:
    <<: *gpt2giga-common
    container_name: gpt2giga_max
    environment:
      GIGACHAT_MODEL: GigaChat-2-Max
      GPT2GIGA_PORT: 8090
      HTTP_PROXY: http://mitmproxy:8080
      HTTPS_PROXY: http://mitmproxy:8080
    ports:
      - "8092:8090"

  mitmproxy:
    image: mitmproxy/mitmproxy:latest
    container_name: mitmproxy
    restart: unless-stopped
    command: >
      mitmweb
      --web-host 0.0.0.0
      --web-port 8081
      --ssl-insecure
      --set web_password=${MITMPROXY_PASSWORD}
      -s /app/sse_event.py
    ports:
      - "8080:8080"
      - "8081:8081"
    volumes:
      - ~/.mitmproxy:/home/mitmproxy/.mitmproxy
      - ./scripts/sse_event.py:/app/sse_event.py:ro
    env_file:
      - .env
    stdin_open: true
    tty: true

  qdrant:
    # Use the official Qdrant Docker image
    image: qdrant/qdrant:latest
    container_name: qdrant
    # Map the container ports to host ports
    ports:
      # Port 6333 is for the HTTP API and Web UI
      - "6333:6333"
      # Port 6334 is for gRPC API (used by some client libraries)
      - "6334:6334"
    # Mount a local directory to persist Qdrant data
    volumes:
      - qdrant_data:/qdrant/storage:z
    restart: always

  # Define the volume for persistent storage
volumes:
  qdrant_data:
