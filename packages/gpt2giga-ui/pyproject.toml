[project]
name = "gpt2giga-ui"
version = "1.0.0rc1"
description = "Optional admin UI assets for gpt2giga"
authors = [{ name = "Konstantin Krestnikov", email = "rai220@gmail.com" }]
requires-python = ">=3.10,<4,<3.15"
readme = "README.md"
license = "MIT"
dependencies = []

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/gpt2giga_ui"]

[tool.hatch.build.targets.sdist]
include = [
  "src/gpt2giga_ui/**",
  "README.md",
]
