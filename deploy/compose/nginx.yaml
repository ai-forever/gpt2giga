services:
  app:
    image: ghcr.io/ai-forever/gpt2giga:latest
    build:
      context: ../..
      dockerfile: Dockerfile
      args:
        PYTHON_VERSION: "3.13"
    env_file:
      - ${GPT2GIGA_COMPOSE_ENV_FILE:-../../.env}
    environment:
      GPT2GIGA_HOST: "0.0.0.0"
      GPT2GIGA_PORT: "8090"
    expose:
      - "8090"

  nginx:
    image: nginx:alpine
    ports:
      - "80:80"
    volumes:
      - ../../docs/integrations/nginx/gpt2giga-compose.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - app
