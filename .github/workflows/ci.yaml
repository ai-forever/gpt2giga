name: CI

on:
  push:
    branches: [ main ]
    paths:
      - 'gpt2giga/**'
      - 'packages/gpt2giga-ui/**'
      - 'frontend-tests/**'
      - 'tests/**'
      - 'scripts/generate_badge.py'
      - 'package.json'
      - 'package-lock.json'
      - 'pyproject.toml'
      - 'tsconfig.json'
      - 'uv.lock'
      - '.github/workflows/ci.yaml'
  pull_request:
    branches: [ main ]
    types: [opened, synchronize, reopened, ready_for_review]
    paths:
      - 'gpt2giga/**'
      - 'packages/gpt2giga-ui/**'
      - 'frontend-tests/**'
      - 'tests/**'
      - 'scripts/generate_badge.py'
      - 'package.json'
      - 'package-lock.json'
      - 'pyproject.toml'
      - 'tsconfig.json'
      - 'uv.lock'
      - '.github/workflows/ci.yaml'
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

env:
  DEFAULT_PYTHON_VERSION: "3.13"
  COVERAGE_PYTHON_VERSION: "3.13"

jobs:
  admin-build:
    name: Build admin frontend
    runs-on: ubuntu-latest
    if: github.event_name != 'pull_request' || github.event.pull_request.draft == false

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install frontend dependencies
        run: npm ci

      - name: Run admin frontend unit tests
        run: npm run test:admin

      - name: Build admin frontend
        run: npm run build:admin

      - name: Verify committed admin assets are up to date
        run: npm run verify:admin-assets

  quality:
    name: Python quality checks
    runs-on: ubuntu-latest
    if: github.event_name != 'pull_request' || github.event.pull_request.draft == false

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Install uv and set Python
        uses: astral-sh/setup-uv@v4
        with:
          python-version: ${{ env.DEFAULT_PYTHON_VERSION }}
          enable-cache: true
          cache-dependency-glob: "uv.lock"

      - name: Install dependencies
        run: uv sync --all-extras --dev --frozen

      - name: Lint with Ruff
        run: uv run ruff check .

      - name: Check formatting with Ruff
        run: uv run ruff format --check .

      - name: Build Python distributions
        run: |
          rm -rf dist
          uv build
          (cd packages/gpt2giga-ui && uv build --out-dir ../../dist)

      - name: Verify build artifacts exist
        run: |
          ls dist/gpt2giga-*.whl
          ls dist/gpt2giga-*.tar.gz
          ls dist/gpt2giga_ui-*.whl
          ls dist/gpt2giga_ui-*.tar.gz

  test:
    name: Test on Python ${{ matrix.python-version }}
    runs-on: ubuntu-latest
    if: github.event_name != 'pull_request' || github.event.pull_request.draft == false
    needs:
      - admin-build
      - quality
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12", "3.13", "3.14"]

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Install uv and set Python ${{ matrix.python-version }}
        uses: astral-sh/setup-uv@v4
        with:
          python-version: ${{ matrix.python-version }}
          enable-cache: true
          cache-dependency-glob: "uv.lock"

      - name: Install dependencies
        run: uv sync --all-extras --dev --frozen

      - name: Run tests with coverage
        run: |
          uv run pytest tests/ --cov=. --cov-report=json:coverage.json --cov-fail-under=80
        continue-on-error: false

      - name: Upload coverage artifact
        uses: actions/upload-artifact@v4
        with:
          name: coverage-${{ matrix.python-version }}
          path: coverage.json


  coverage-badge:
    name: Generate coverage badge
    runs-on: ubuntu-latest
    needs: test

    permissions:
      contents: write
      pull-requests: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          ref: ${{ github.head_ref || github.ref_name }}

      - name: Download coverage artifact from one Python version
        uses: actions/download-artifact@v4
        with:
          name: coverage-${{ env.COVERAGE_PYTHON_VERSION }}
          path: .

      - name: Install uv and set Python
        uses: astral-sh/setup-uv@v4
        with:
          python-version: ${{ env.COVERAGE_PYTHON_VERSION }}

      - name: Generate badge
        run: |
          COVERAGE=$(uv run python - <<'PY'
          import json
          from pathlib import Path

          coverage = json.loads(Path("coverage.json").read_text(encoding="utf-8"))
          print(coverage["totals"]["percent_covered"])
          PY
          )
          echo "COVERAGE=$COVERAGE" >> "$GITHUB_ENV"
          uv run python scripts/generate_badge.py "$COVERAGE" badges/coverage.svg

      - name: Upload badge artifact
        uses: actions/upload-artifact@v4
        with:
          name: coverage-badge
          path: badges/coverage.svg

      - name: Commit coverage badge to branch (if internal)
        if: github.event.pull_request.head.repo.full_name == github.repository || github.event_name == 'push'
        env:
          BRANCH_NAME: ${{ github.head_ref || github.ref_name }}
        run: |
          echo "Pushing coverage badge to branch: $BRANCH_NAME"

          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add badges/coverage.svg
          git commit -m "Update coverage badge for $BRANCH_NAME" || echo "No changes to commit"
          git push origin "HEAD:$BRANCH_NAME"

      - name: Comment coverage badge on PR
        if: github.event_name == 'pull_request'
        uses: marocchino/sticky-pull-request-comment@v2
        with:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          header: coverage-badge
          message: |
            ## 🧪 Test Coverage Report
            Coverage: ${{ env.COVERAGE }}%

            ![Coverage Badge](https://raw.githubusercontent.com/${{ github.repository }}/${{ github.head_ref || github.ref_name }}/badges/coverage.svg)
