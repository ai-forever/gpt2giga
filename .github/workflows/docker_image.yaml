name: Docker Image CI

on:
  push:
    branches: [ "main" ]
    paths:
      - 'Dockerfile'
      - 'gpt2giga/**'
      - 'pyproject.toml'
      - 'uv.lock'
      - '.github/workflows/docker_image.yaml'

env:
  REGISTRY: docker.io
  IMAGE_NAME: gigateam/gpt2giga

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ['3.10', '3.11', '3.12', '3.13', '3.14']

    steps:
    - uses: actions/checkout@v6

    - name: Get version
      id: get_version
      shell: bash
      run: |
        VERSION="$(python3 - <<'PY'
        import tomllib
        from pathlib import Path

        pyproject = tomllib.loads(Path("pyproject.toml").read_text(encoding="utf-8"))
        print(pyproject["project"]["version"])
        PY
        )"

        if [ -z "$VERSION" ]; then
          echo "::error::Unable to determine project version from pyproject.toml"
          exit 1
        fi

        echo "VERSION=$VERSION" >> "$GITHUB_OUTPUT"

    - name: Set up Python ${{ matrix.python-version }}
      uses: actions/setup-python@v6
      with:
        python-version: ${{ matrix.python-version }}

    - name: Log in to Docker Hub
      uses: docker/login-action@v4
      with:
        registry: ${{ env.REGISTRY }}
        username: ${{ secrets.DOCKERHUB_LOGIN }}
        password: ${{ secrets.DOCKERHUB_PASSWORD }}

    - name: Set up QEMU
      uses: docker/setup-qemu-action@v3

    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v4

    - name: Prepare Docker tags
      id: docker_tags
      shell: bash
      run: |
        PYTHON_VERSION="${{ matrix.python-version }}"
        VERSION="${{ steps.get_version.outputs.VERSION }}"

        {
          echo "tags<<EOF"
          echo "${IMAGE_NAME}:python${PYTHON_VERSION}"
          echo "${IMAGE_NAME}:python${PYTHON_VERSION}-${GITHUB_SHA}"
          echo "${IMAGE_NAME}:${VERSION}-python${PYTHON_VERSION}"
          if [ "${PYTHON_VERSION}" = "3.13" ]; then
            echo "${IMAGE_NAME}:${VERSION}"
            echo "${IMAGE_NAME}:latest"
          fi
          echo "EOF"
        } >> "$GITHUB_OUTPUT"

    - name: Build and push Docker image
      uses: docker/build-push-action@v5
      with:
        context: .
        file: ./Dockerfile
        build-args: |
          PYTHON_VERSION=${{ matrix.python-version }}
        push: true
        platforms: linux/amd64,linux/arm64
        tags: ${{ steps.docker_tags.outputs.tags }}
        labels: |
          org.opencontainers.image.source=https://github.com/${{ github.repository }}
