name: Docker Image CI

on:
  push:
    branches: [ "main" ]
    paths:
      - 'Dockerfile'
      - 'gpt2giga/**'
      - 'packages/gpt2giga-ui/**'
      - 'package.json'
      - 'package-lock.json'
      - 'pyproject.toml'
      - 'tsconfig.json'
      - 'uv.lock'
      - '.github/workflows/docker_image.yaml'

env:
  REGISTRY: docker.io
  IMAGE_NAME: gigateam/gpt2giga

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - python-version: '3.10'
            publish-stable-tags: 'false'
          - python-version: '3.11'
            publish-stable-tags: 'false'
          - python-version: '3.13'
            publish-stable-tags: 'true'
          - python-version: '3.12'
            publish-stable-tags: 'false'
          - python-version: '3.14'
            publish-stable-tags: 'false'

    steps:
    - uses: actions/checkout@v6

    - name: Get version
      id: get_version
      shell: bash
      run: |
        VERSION="$(python3 - <<'PY'
        import tomllib
        from pathlib import Path

        pyproject = tomllib.loads(Path("pyproject.toml").read_text(encoding="utf-8"))
        print(pyproject["project"]["version"])
        PY
        )"

        if [ -z "$VERSION" ]; then
          echo "::error::Unable to determine project version from pyproject.toml"
          exit 1
        fi

        echo "VERSION=$VERSION" >> "$GITHUB_OUTPUT"

    - name: Log in to Docker Hub
      uses: docker/login-action@v4
      with:
        registry: ${{ env.REGISTRY }}
        username: ${{ secrets.DOCKERHUB_LOGIN }}
        password: ${{ secrets.DOCKERHUB_PASSWORD }}

    - name: Set up QEMU
      uses: docker/setup-qemu-action@v3

    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v4

    - name: Build and push Docker image
      if: matrix.publish-stable-tags != 'true'
      uses: docker/build-push-action@v5
      with:
        context: .
        file: ./Dockerfile
        build-args: |
          PYTHON_VERSION=${{ matrix.python-version }}
        push: true
        platforms: linux/amd64,linux/arm64
        tags: |
          ${{ env.IMAGE_NAME }}:python${{ matrix.python-version }}
          ${{ env.IMAGE_NAME }}:python${{ matrix.python-version }}-${{ github.sha }}
          ${{ env.IMAGE_NAME }}:${{ steps.get_version.outputs.VERSION }}-python${{ matrix.python-version }}
        labels: |
          org.opencontainers.image.source=https://github.com/${{ github.repository }}
        cache-from: type=gha
        cache-to: type=gha,mode=max

    - name: Build and push canonical Docker image tags
      if: matrix.publish-stable-tags == 'true'
      uses: docker/build-push-action@v5
      with:
        context: .
        file: ./Dockerfile
        build-args: |
          PYTHON_VERSION=${{ matrix.python-version }}
        push: true
        platforms: linux/amd64,linux/arm64
        tags: |
          ${{ env.IMAGE_NAME }}:python${{ matrix.python-version }}
          ${{ env.IMAGE_NAME }}:python${{ matrix.python-version }}-${{ github.sha }}
          ${{ env.IMAGE_NAME }}:${{ steps.get_version.outputs.VERSION }}-python${{ matrix.python-version }}
          ${{ env.IMAGE_NAME }}:${{ steps.get_version.outputs.VERSION }}
          ${{ env.IMAGE_NAME }}:latest
        labels: |
          org.opencontainers.image.source=https://github.com/${{ github.repository }}
        cache-from: type=gha
        cache-to: type=gha,mode=max
