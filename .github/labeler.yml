openai:
  - changed-files:
      - any-glob-to-any-file:
          - 'gpt2giga/api/openai/**'
          - 'examples/openai/**'
          - 'examples/agents/**'

anthropic:
  - changed-files:
      - any-glob-to-any-file:
          - 'gpt2giga/api/anthropic/**'
          - 'examples/anthropic/**'

protocol:
  - changed-files:
      - any-glob-to-any-file:
          - 'gpt2giga/protocol/**'

docker:
  - changed-files:
      - any-glob-to-any-file:
          - 'Dockerfile'
          - 'Dockerfile.mitmproxy'
          - '.dockerignore'
          - 'compose/**'
          - 'traefik/**'

ci:
  - changed-files:
      - any-glob-to-any-file:
          - '.github/workflows/**'
          - '.github/dependabot.yml'
          - '.github/labeler.yml'
          - '.github/release-drafter.yml'
          - '.github/AGENTS.md'

docs:
  - changed-files:
      - any-glob-to-any-file:
          - 'README.md'
          - 'integrations/**'
          - 'examples/**/*.md'
          - '.github/PULL_REQUEST_TEMPLATE.md'
          - '.github/ISSUE_TEMPLATE/**'

tests:
  - changed-files:
      - any-glob-to-any-file:
          - 'tests/**'

dependencies:
  - changed-files:
      - any-glob-to-any-file:
          - 'pyproject.toml'
          - 'uv.lock'
