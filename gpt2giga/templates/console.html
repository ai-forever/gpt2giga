<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>gpt2giga Console</title>
    <style>
      :root {
        --bg: #f4efe6;
        --panel: rgba(255, 251, 245, 0.88);
        --panel-strong: #fffdf8;
        --panel-dark: #13332f;
        --ink: #1f2521;
        --muted: #5f665f;
        --line: rgba(19, 51, 47, 0.12);
        --accent: #0f766e;
        --accent-soft: rgba(15, 118, 110, 0.14);
        --warn: #a16207;
        --warn-soft: rgba(161, 98, 7, 0.12);
        --danger: #b91c1c;
        --danger-soft: rgba(185, 28, 28, 0.12);
        --shadow: 0 24px 60px rgba(17, 24, 39, 0.08);
        --radius: 22px;
        --radius-sm: 14px;
        --font-sans: "IBM Plex Sans", "Avenir Next", "Segoe UI", sans-serif;
        --font-mono: "IBM Plex Mono", "SFMono-Regular", Consolas, monospace;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        min-height: 100vh;
        color: var(--ink);
        font-family: var(--font-sans);
        background:
          radial-gradient(circle at top left, rgba(15, 118, 110, 0.14), transparent 30%),
          radial-gradient(circle at top right, rgba(161, 98, 7, 0.12), transparent 26%),
          linear-gradient(180deg, #fbf7ef 0%, #f2ecdf 100%);
      }

      a {
        color: inherit;
        text-decoration: none;
      }

      .shell {
        display: grid;
        grid-template-columns: 280px 1fr;
        gap: 24px;
        padding: 24px;
      }

      .rail {
        position: sticky;
        top: 24px;
        height: calc(100vh - 48px);
        padding: 24px;
        border: 1px solid var(--line);
        border-radius: var(--radius);
        background: linear-gradient(180deg, rgba(255,255,255,0.96), rgba(247,243,236,0.92));
        box-shadow: var(--shadow);
        display: flex;
        flex-direction: column;
        gap: 22px;
      }

      .brand {
        display: flex;
        flex-direction: column;
        gap: 8px;
      }

      .eyebrow {
        font-size: 12px;
        letter-spacing: 0.16em;
        text-transform: uppercase;
        color: var(--muted);
      }

      .brand h1 {
        margin: 0;
        font-size: 30px;
        line-height: 1;
      }

      .brand p {
        margin: 0;
        color: var(--muted);
        font-size: 14px;
        line-height: 1.5;
      }

      .status-stack,
      .nav,
      .auth-box {
        display: flex;
        flex-direction: column;
        gap: 12px;
      }

      .status-chip,
      .nav a {
        display: flex;
        justify-content: space-between;
        align-items: center;
        gap: 12px;
        padding: 11px 14px;
        border-radius: 999px;
        border: 1px solid var(--line);
        background: rgba(255, 255, 255, 0.72);
        font-size: 14px;
      }

      .nav a.active {
        background: var(--panel-dark);
        color: #f7f6f1;
        border-color: transparent;
      }

      .status-chip strong {
        font-size: 12px;
        color: var(--muted);
        text-transform: uppercase;
        letter-spacing: 0.12em;
      }

      .rail input {
        width: 100%;
      }

      .main {
        display: flex;
        flex-direction: column;
        gap: 18px;
      }

      .hero,
      .panel,
      .wide-panel {
        border: 1px solid var(--line);
        border-radius: var(--radius);
        background: var(--panel);
        backdrop-filter: blur(16px);
        box-shadow: var(--shadow);
      }

      .hero {
        padding: 28px;
        display: flex;
        justify-content: space-between;
        gap: 24px;
        align-items: flex-start;
      }

      .hero h2,
      .panel h3,
      .wide-panel h3 {
        margin: 0;
      }

      .hero p,
      .panel p,
      .wide-panel p {
        color: var(--muted);
        line-height: 1.5;
      }

      .hero-actions {
        display: flex;
        flex-wrap: wrap;
        gap: 10px;
      }

      .content-grid {
        display: grid;
        grid-template-columns: repeat(12, minmax(0, 1fr));
        gap: 18px;
      }

      .span-3 { grid-column: span 3; }
      .span-4 { grid-column: span 4; }
      .span-6 { grid-column: span 6; }
      .span-8 { grid-column: span 8; }
      .span-12 { grid-column: span 12; }

      .panel,
      .wide-panel {
        padding: 22px;
      }

      .kpi {
        display: flex;
        flex-direction: column;
        gap: 8px;
      }

      .kpi .label {
        color: var(--muted);
        font-size: 13px;
        text-transform: uppercase;
        letter-spacing: 0.12em;
      }

      .kpi .value {
        font-size: 30px;
        line-height: 1;
        font-weight: 700;
      }

      .banner {
        padding: 14px 16px;
        border-radius: var(--radius-sm);
        border: 1px solid var(--line);
        background: var(--accent-soft);
      }

      .banner.warn {
        background: var(--warn-soft);
      }

      .banner.danger {
        background: var(--danger-soft);
      }

      .toolbar,
      .stack,
      .split,
      .list {
        display: flex;
        gap: 12px;
      }

      .toolbar {
        flex-wrap: wrap;
        align-items: center;
      }

      .stack {
        flex-direction: column;
      }

      .split {
        align-items: flex-start;
      }

      .split > * {
        flex: 1;
      }

      label {
        display: flex;
        flex-direction: column;
        gap: 6px;
        font-size: 13px;
        color: var(--muted);
      }

      input,
      select,
      textarea,
      button {
        font: inherit;
      }

      input,
      select,
      textarea {
        width: 100%;
        padding: 12px 14px;
        border-radius: 14px;
        border: 1px solid rgba(19, 51, 47, 0.16);
        background: rgba(255, 255, 255, 0.9);
        color: var(--ink);
      }

      textarea {
        min-height: 120px;
        resize: vertical;
        font-family: var(--font-mono);
        font-size: 13px;
      }

      .code,
      pre {
        padding: 14px;
        border-radius: 16px;
        background: #11211f;
        color: #ecfdf5;
        font-family: var(--font-mono);
        font-size: 13px;
        white-space: pre-wrap;
        word-break: break-word;
        overflow: auto;
      }

      table {
        width: 100%;
        border-collapse: collapse;
      }

      th,
      td {
        padding: 10px 0;
        border-bottom: 1px solid var(--line);
        vertical-align: top;
        text-align: left;
      }

      th {
        font-size: 12px;
        text-transform: uppercase;
        letter-spacing: 0.12em;
        color: var(--muted);
      }

      button {
        border: 0;
        border-radius: 999px;
        padding: 11px 16px;
        background: var(--panel-dark);
        color: #f6f7f2;
        cursor: pointer;
      }

      button.secondary {
        background: rgba(255, 255, 255, 0.9);
        color: var(--ink);
        border: 1px solid var(--line);
      }

      button.warn {
        background: #92400e;
      }

      button.danger {
        background: #991b1b;
      }

      .pill {
        display: inline-flex;
        align-items: center;
        padding: 5px 10px;
        border-radius: 999px;
        font-size: 12px;
        background: rgba(255, 255, 255, 0.8);
        border: 1px solid var(--line);
      }

      .muted {
        color: var(--muted);
      }

      .hidden {
        display: none;
      }

      .step-grid {
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
        gap: 12px;
      }

      .step-card {
        padding: 16px;
        border-radius: 18px;
        border: 1px solid var(--line);
        background: rgba(255, 255, 255, 0.74);
      }

      .step-card.ready {
        background: rgba(15, 118, 110, 0.1);
        border-color: rgba(15, 118, 110, 0.24);
      }

      .step-card h4 {
        margin: 0 0 8px;
        font-size: 16px;
      }

      .step-card p {
        margin: 0;
        font-size: 13px;
      }

      .stat-line {
        display: flex;
        justify-content: space-between;
        gap: 12px;
        padding: 10px 0;
        border-bottom: 1px solid var(--line);
        font-size: 14px;
      }

      .stat-line:last-child {
        border-bottom: 0;
      }

      @media (max-width: 1100px) {
        .shell {
          grid-template-columns: 1fr;
        }

        .rail {
          position: static;
          height: auto;
        }

        .span-3,
        .span-4,
        .span-6,
        .span-8,
        .span-12 {
          grid-column: span 12;
        }
      }
    </style>
  </head>
  <body>
    <div class="shell">
      <aside class="rail">
        <div class="brand">
          <span class="eyebrow">Gateway Console</span>
          <h1>gpt2giga</h1>
          <p>Control plane for bootstrap, keys, logs, traffic and test calls.</p>
        </div>
        <div class="status-stack">
          <div class="status-chip"><strong>Mode</strong><span id="mode-chip">...</span></div>
          <div class="status-chip"><strong>Backend</strong><span id="backend-chip">...</span></div>
          <div class="status-chip"><strong>Config</strong><span id="persisted-chip">...</span></div>
        </div>
        <nav class="nav" id="nav">
          <a href="/admin">Overview</a>
          <a href="/admin/setup">Setup</a>
          <a href="/admin/settings">Settings</a>
          <a href="/admin/keys">API Keys</a>
          <a href="/admin/logs">Logs</a>
          <a href="/admin/playground">Playground</a>
          <a href="/admin/traffic">Traffic</a>
          <a href="/admin/providers">Providers</a>
          <a href="/admin/files-batches">Files &amp; Batches</a>
          <a href="/admin/system">System</a>
        </nav>
        <div class="auth-box">
          <label>
            Admin API key
            <input id="admin-key-input" type="password" placeholder="If /admin requires auth" />
          </label>
          <label>
            Gateway API key
            <input id="gateway-key-input" type="password" placeholder="Used by playground" />
          </label>
          <button class="secondary" id="save-auth">Save keys locally</button>
        </div>
      </aside>

      <main class="main">
        <section class="hero">
          <div class="stack">
            <span class="eyebrow" id="page-eyebrow">Console</span>
            <h2 id="page-title">Loading…</h2>
            <p id="page-subtitle">Collecting runtime state and control-plane data.</p>
          </div>
          <div class="hero-actions" id="hero-actions"></div>
        </section>

        <section id="alerts" class="stack"></section>
        <section id="page-content" class="content-grid"></section>
      </main>
    </div>

    <script>
      const ADMIN_KEY_STORAGE = "gpt2giga.adminKey";
      const GATEWAY_KEY_STORAGE = "gpt2giga.gatewayKey";
      const pageContent = document.getElementById("page-content");
      const alertsNode = document.getElementById("alerts");
      const heroActions = document.getElementById("hero-actions");
      const adminKeyInput = document.getElementById("admin-key-input");
      const gatewayKeyInput = document.getElementById("gateway-key-input");

      adminKeyInput.value = localStorage.getItem(ADMIN_KEY_STORAGE) || "";
      gatewayKeyInput.value = localStorage.getItem(GATEWAY_KEY_STORAGE) || adminKeyInput.value;

      document.getElementById("save-auth").addEventListener("click", () => {
        localStorage.setItem(ADMIN_KEY_STORAGE, adminKeyInput.value.trim());
        localStorage.setItem(GATEWAY_KEY_STORAGE, gatewayKeyInput.value.trim());
        pushAlert("Saved API keys in browser local storage.", "info");
      });

      const routeMeta = {
        overview: {
          eyebrow: "Overview",
          title: "Gateway overview",
          subtitle: "Health, setup readiness, usage volume and operator warnings in one place.",
        },
        setup: {
          eyebrow: "Setup",
          title: "Bootstrap and first-run flow",
          subtitle: "Persist control-plane config, configure GigaChat and lock down gateway access from one guided page.",
        },
        settings: {
          eyebrow: "Settings",
          title: "Split configuration editor",
          subtitle: "Application, GigaChat and security settings with persisted control-plane storage.",
        },
        keys: {
          eyebrow: "Keys",
          title: "API key control",
          subtitle: "Create, rotate and revoke gateway keys without touching .env files.",
        },
        logs: {
          eyebrow: "Logs",
          title: "Dedicated log page",
          subtitle: "Tail logs, stream new lines and inspect failures without leaving the console.",
        },
        playground: {
          eyebrow: "Playground",
          title: "Manual request playground",
          subtitle: "Test OpenAI, Anthropic and Gemini-compatible calls directly against this proxy.",
        },
        traffic: {
          eyebrow: "Traffic",
          title: "Request and error traffic",
          subtitle: "Recent request feeds, usage summaries and recent errors from runtime observability.",
        },
        providers: {
          eyebrow: "Providers",
          title: "Mounted surfaces",
          subtitle: "See which provider groups are enabled, what routes exist and which capabilities are live.",
        },
        "files-batches": {
          eyebrow: "Files & Batches",
          title: "Files and batch jobs",
          subtitle: "Upload JSONL inputs, inspect stored files and launch OpenAI-compatible batch jobs from the console.",
        },
        system: {
          eyebrow: "System",
          title: "Runtime and setup internals",
          subtitle: "Config source, mounted routes and stateful backend diagnostics.",
        },
      };

      function currentPage() {
        const path = window.location.pathname.replace(/^\/admin\/?/, "");
        const queryTab = new URLSearchParams(window.location.search).get("tab");
        const page = queryTab || path || "overview";
        return routeMeta[page] ? page : "overview";
      }

      function authHeaders(forGateway = false) {
        const key = (forGateway ? gatewayKeyInput.value : adminKeyInput.value).trim();
        if (!key) return {};
        return { Authorization: `Bearer ${key}` };
      }

      async function apiFetch(url, options = {}, forGateway = false) {
        const headers = {
          ...(options.headers || {}),
          ...authHeaders(forGateway),
        };
        const response = await fetch(url, { ...options, headers });
        if (!response.ok) {
          const text = await response.text();
          throw new Error(`${url} -> ${response.status}\n${text}`);
        }
        const contentType = response.headers.get("content-type") || "";
        if (contentType.includes("application/json")) {
          return response.json();
        }
        return response.text();
      }

      function escapeHtml(value) {
        return String(value ?? "")
          .replaceAll("&", "&amp;")
          .replaceAll("<", "&lt;")
          .replaceAll(">", "&gt;");
      }

      function pushAlert(message, kind = "info") {
        const node = document.createElement("div");
        node.className = `banner ${kind === "danger" ? "danger" : kind === "warn" ? "warn" : ""}`;
        node.textContent = message;
        alertsNode.prepend(node);
      }

      function clearAlerts() {
        alertsNode.innerHTML = "";
      }

      function setHero(page) {
        const meta = routeMeta[page];
        document.getElementById("page-eyebrow").textContent = meta.eyebrow;
        document.getElementById("page-title").textContent = meta.title;
        document.getElementById("page-subtitle").textContent = meta.subtitle;
      }

      function setNav(page) {
        for (const link of document.querySelectorAll("#nav a")) {
          const href = link.getAttribute("href");
          const matchesOverview = page === "overview" && href === "/admin";
          link.classList.toggle("active", matchesOverview || href === `/admin/${page}`);
        }
      }

      function card(title, body, className = "panel span-4") {
        return `<article class="${className}"><div class="stack"><h3>${escapeHtml(title)}</h3>${body}</div></article>`;
      }

      function kpi(label, value, className = "panel span-3") {
        return `<article class="${className}"><div class="kpi"><span class="label">${escapeHtml(label)}</span><span class="value">${escapeHtml(value)}</span></div></article>`;
      }

      function renderSetupSteps(steps) {
        return `<div class="step-grid">${(steps || [])
          .map(
            (step) => `<div class="step-card ${step.ready ? "ready" : ""}">
              <div class="pill">${step.ready ? "ready" : "pending"}</div>
              <h4>${escapeHtml(step.label)}</h4>
              <p>${escapeHtml(step.description || "")}</p>
            </div>`,
          )
          .join("")}</div>`;
      }

      function formatTimestamp(value) {
        if (value === null || value === undefined || value === "") {
          return "n/a";
        }
        const numeric = Number(value);
        if (!Number.isFinite(numeric)) {
          return String(value);
        }
        return new Date(numeric * 1000).toLocaleString();
      }

      function formatBytes(value) {
        const numeric = Number(value || 0);
        if (!Number.isFinite(numeric) || numeric <= 0) {
          return "0 B";
        }
        const units = ["B", "KB", "MB", "GB"];
        let size = numeric;
        let unitIndex = 0;
        while (size >= 1024 && unitIndex < units.length - 1) {
          size /= 1024;
          unitIndex += 1;
        }
        const precision = size >= 100 || unitIndex === 0 ? 0 : 1;
        return `${size.toFixed(precision)} ${units[unitIndex]}`;
      }

      function safeJsonParse(value, fallback = null) {
        try {
          return JSON.parse(value);
        } catch {
          return fallback;
        }
      }

      async function gatewayFetch(url, options = {}) {
        const headers = {
          ...(options.headers || {}),
          ...authHeaders(true),
        };
        const response = await fetch(url, { ...options, headers });
        if (!response.ok) {
          const text = await response.text();
          throw new Error(`${url} -> ${response.status}\n${text}`);
        }
        return response;
      }

      async function gatewayJson(url, options = {}) {
        const response = await gatewayFetch(url, options);
        return response.json();
      }

      async function gatewayText(url, options = {}) {
        const response = await gatewayFetch(url, options);
        return response.text();
      }

      async function loadGlobalStatus() {
        try {
          const [runtime, setup] = await Promise.all([
            apiFetch("/admin/api/runtime"),
            apiFetch("/admin/api/setup"),
          ]);
          document.getElementById("mode-chip").textContent = runtime.mode;
          document.getElementById("backend-chip").textContent = runtime.gigachat_api_mode;
          document.getElementById("persisted-chip").textContent = setup.persisted ? "persisted" : "defaults";
          if (!setup.persisted) {
            pushAlert("Control-plane config is not persisted yet. Save settings in the UI to make zero-env restarts work.", "warn");
          }
          if (!setup.gigachat_ready) {
            pushAlert("GigaChat credentials are not configured yet. Playground calls will fail until you fill the GigaChat section.", "warn");
          }
          if (!setup.security_ready) {
            pushAlert("Gateway auth bootstrap is incomplete. Create a global or scoped API key before exposing the proxy beyond local bring-up.", "warn");
          }
          if (runtime.mode === "DEV") {
            pushAlert("Console is running in DEV mode. That keeps /admin and docs available, which is convenient but not hardened.", "info");
          }
        } catch (error) {
          pushAlert(`Failed to load global admin status. ${error.message}`, "danger");
        }
      }

      async function renderOverview() {
        const [runtime, setup, usageKeys, usageProviders, errors] = await Promise.all([
          apiFetch("/admin/api/runtime"),
          apiFetch("/admin/api/setup"),
          apiFetch("/admin/api/usage/keys"),
          apiFetch("/admin/api/usage/providers"),
          apiFetch("/admin/api/errors/recent?limit=5"),
        ]);

        const summary = usageProviders.summary || {};
        const recentErrors = (errors.events || []).slice(-5).reverse();

        heroActions.innerHTML = setup.setup_complete
          ? `
              <a href="/admin/playground"><button>Try playground</button></a>
              <a href="/admin/settings"><button class="secondary">Open settings</button></a>
            `
          : `
              <a href="/admin/setup"><button>Open setup wizard</button></a>
              <a href="/admin/settings"><button class="secondary">Open settings</button></a>
            `;

        pageContent.innerHTML = [
          kpi("Requests", summary.request_count || 0),
          kpi("Errors", summary.error_count || 0),
          kpi("Tokens", summary.total_tokens || 0),
          kpi("Scoped Keys", setup.scoped_api_keys_configured || 0),
          card(
            "Setup readiness",
            `<div class="stack">
              <div class="pill">Persisted config: ${setup.persisted ? "yes" : "no"}</div>
              <div class="pill">GigaChat ready: ${setup.gigachat_ready ? "yes" : "no"}</div>
              <div class="pill">Security ready: ${setup.security_ready ? "yes" : "no"}</div>
              <div class="pill">Admin global key: ${setup.global_api_key_configured ? "configured" : "missing"}</div>
            </div>`,
            "wide-panel span-4",
          ),
          card(
            "Runtime posture",
            `<div class="stack">
              <div class="pill">Mode: ${runtime.mode}</div>
              <div class="pill">Providers: ${runtime.enabled_providers.join(", ")}</div>
              <div class="pill">Telemetry: ${runtime.telemetry_enabled ? "on" : "off"}</div>
              <div class="pill">Store: ${runtime.runtime_store_backend}</div>
            </div>`,
            "wide-panel span-4",
          ),
          card(
            "Recent errors",
            recentErrors.length
              ? `<pre>${escapeHtml(JSON.stringify(recentErrors, null, 2))}</pre>`
              : `<p>No recent errors recorded.</p>`,
            "wide-panel span-4",
          ),
          card(
            "Usage by key",
            `<pre>${escapeHtml(JSON.stringify(usageKeys.entries || [], null, 2))}</pre>`,
            "wide-panel span-6",
          ),
          card(
            "Usage by provider",
            `<pre>${escapeHtml(JSON.stringify(usageProviders.entries || [], null, 2))}</pre>`,
            "wide-panel span-6",
          ),
        ].join("");
      }

      function csv(value) {
        return Array.isArray(value) ? value.join(", ") : "";
      }

      function parseCsv(value) {
        return value
          .split(",")
          .map((item) => item.trim())
          .filter(Boolean);
      }

      function collectGigachatPayload(form) {
        return {
          model: form.model.value.trim() || null,
          scope: form.scope.value.trim() || null,
          base_url: form.base_url.value.trim() || null,
          auth_url: form.auth_url.value.trim() || null,
          credentials: form.credentials.value.trim() || null,
          access_token: form.access_token.value.trim() || null,
          verify_ssl_certs: form.verify_ssl_certs.value === "true",
          timeout: form.timeout && form.timeout.value ? Number(form.timeout.value) : null,
        };
      }

      async function renderSetup() {
        const [setup, runtime, application, gigachat, security, keys] = await Promise.all([
          apiFetch("/admin/api/setup"),
          apiFetch("/admin/api/runtime"),
          apiFetch("/admin/api/settings/application"),
          apiFetch("/admin/api/settings/gigachat"),
          apiFetch("/admin/api/settings/security"),
          apiFetch("/admin/api/keys"),
        ]);

        heroActions.innerHTML = `
          <button class="secondary" id="refresh-setup">Refresh setup state</button>
          <a href="/admin/settings"><button>Open full settings</button></a>
        `;

        pageContent.innerHTML = `
          ${card(
            "Setup progress",
            `<div class="stack">
              ${renderSetupSteps(setup.wizard_steps)}
              <div class="split">
                <div class="stack">
                  <div class="stat-line"><strong>Control-plane file</strong><span class="muted">${escapeHtml(setup.path)}</span></div>
                  <div class="stat-line"><strong>Encryption key file</strong><span class="muted">${escapeHtml(setup.key_path || "n/a")}</span></div>
                  <div class="stat-line"><strong>Runtime mode</strong><span class="muted">${escapeHtml(runtime.mode)}</span></div>

            `<div class="toolbar">
              <label>Lines <input id="log-lines" value="150" /></label>
            </div>`,
            "wide-panel span-3",
          )}
          ${card(
            "Live log output",
            `<pre id="log-output">Loading logs…</pre>`,
            "wide-panel span-9",
          )}
        `;

        const logOutput = document.getElementById("log-output");
        const logLines = document.getElementById("log-lines");
        let session = { active: false, controller: null };

        async function refreshLogs() {
          const text = await apiFetch(`/admin/api/logs?lines=${encodeURIComponent(logLines.value || "150")}`);
          logOutput.textContent = text || "No log lines available.";
        }

        async function startStream() {
          session.active = true;
          session.controller = new AbortController();
          const response = await fetch("/admin/api/logs/stream", {
            headers: authHeaders(false),
            signal: session.controller.signal,
          });
          const reader = response.body.getReader();
          const decoder = new TextDecoder();
          while (session.active) {
            const { value, done } = await reader.read();
            if (done) break;
            logOutput.textContent += decoder.decode(value, { stream: true });
            logOutput.scrollTop = logOutput.scrollHeight;
          }
        }

        document.getElementById("refresh-logs").addEventListener("click", refreshLogs);
        document.getElementById("toggle-stream").addEventListener("click", async (event) => {
          if (session.active) {
            session.active = false;
            session.controller?.abort();
            event.currentTarget.textContent = "Start live stream";
            return;
          }
          event.currentTarget.textContent = "Stop live stream";
          await startStream();
        });

        refreshLogs();
      }

      async function renderPlayground() {
        heroActions.innerHTML = `<button class="secondary" id="playground-reset">Reset output</button>`;
        pageContent.innerHTML = `
          ${card(
            "Request",
            `<form id="playground-form" class="stack">
              <label>Surface
                <select name="surface">
                  <option value="openai-chat">OpenAI chat/completions</option>
                  <option value="openai-responses">OpenAI responses</option>
                  <option value="anthropic-messages">Anthropic messages</option>
                  <option value="gemini-generate">Gemini generateContent</option>
                </select>
              </label>
              <label>Model <input name="model" value="GigaChat" /></label>
              <label>System prompt <textarea name="system_prompt" placeholder="Optional system prompt"></textarea></label>
              <label>User prompt <textarea name="user_prompt" placeholder="Say something to the model">Привет! Ответь одной фразой.</textarea></label>
              <label><span>Stream</span><select name="stream"><option value="false">off</option><option value="true">on</option></select></label>
              <button>Send request</button>
            </form>`,
            "wide-panel span-4",
          )}
          ${card(
            "Response",
            `<pre id="playground-output">No request yet.</pre>`,
            "wide-panel span-8",
          )}
        `;

        function buildRequest(form) {
          const surface = form.surface.value;
          const model = form.model.value.trim();
          const systemPrompt = form.system_prompt.value.trim();
          const userPrompt = form.user_prompt.value.trim();
          const stream = form.stream.value === "true";

          if (surface === "openai-chat") {
            return {
              url: "/v1/chat/completions",
              body: {
                model,
                stream,
                messages: [
                  ...(systemPrompt ? [{ role: "system", content: systemPrompt }] : []),
                  { role: "user", content: userPrompt },
                ],
              },
            };
          }

          if (surface === "openai-responses") {
            return {
              url: "/v1/responses",
              body: {
                model,
                stream,
                instructions: systemPrompt || undefined,
                input: userPrompt,
              },
            };
          }

          if (surface === "anthropic-messages") {
            return {
              url: "/v1/messages",
              body: {
                model,
                stream,
                max_tokens: 256,
                system: systemPrompt || undefined,
                messages: [{ role: "user", content: userPrompt }],
              },
            };
          }

          return {
            url: `/v1beta/models/${encodeURIComponent(model)}:generateContent`,
            body: {
              contents: [
                {
                  role: "user",
                  parts: [{ text: systemPrompt ? `${systemPrompt}\n\n${userPrompt}` : userPrompt }],
                },
              ],
            },
          };
        }

        document.getElementById("playground-form").addEventListener("submit", async (event) => {
          event.preventDefault();
          const output = document.getElementById("playground-output");
          const request = buildRequest(event.currentTarget);
          output.textContent = "Sending request…";
          const response = await fetch(request.url, {
            method: "POST",
            headers: {
              "Content-Type": "application/json",
              ...authHeaders(true),
            },
            body: JSON.stringify(request.body),
          });
          const text = await response.text();
          output.textContent = text;
        });

        document.getElementById("playground-reset").addEventListener("click", () => {
          document.getElementById("playground-output").textContent = "No request yet.";
        });
      }

      async function renderFilesBatches() {
        const [filesPayload, batchesPayload] = await Promise.all([
          gatewayJson("/v1/files?order=desc&limit=100"),
          gatewayJson("/v1/batches?limit=100"),
        ]);
        const files = filesPayload.data || [];
        const batches = batchesPayload.data || [];
        const completedBatches = batches.filter((batch) => batch.status === "completed").length;
        const activeBatches = batches.filter((batch) => batch.status !== "completed").length;

        heroActions.innerHTML = `
          <button class="secondary" id="refresh-files-batches">Refresh inventory</button>
          <a href="/admin/playground"><button>Open playground</button></a>
        `;

        pageContent.innerHTML = `
          ${kpi("Files", files.length)}
          ${kpi("Batches", batches.length)}
          ${kpi("Completed", completedBatches)}
          ${kpi("Active", activeBatches)}
          ${card(
            "Upload file",
            `<form id="files-upload-form" class="stack">
              <label>Purpose
                <select name="purpose">
                  <option value="batch">batch</option>
                  <option value="assistants">assistants</option>
                  <option value="user_data">user_data</option>
                </select>
              </label>
              <label>File
                <input name="file" type="file" required />
              </label>
              <div class="banner">Uploads go through the OpenAI-compatible gateway surface and use the gateway API key from the rail.</div>
              <button type="submit">Upload file</button>
            </form>`,
            "wide-panel span-4",
          )}
          ${card(
            "Create batch",
            `<form id="batch-create-form" class="stack">
              <label>Endpoint
                <select name="endpoint">
                  <option value="/v1/chat/completions">/v1/chat/completions</option>
                  <option value="/v1/responses">/v1/responses</option>
                  <option value="/v1/embeddings">/v1/embeddings</option>
                </select>
              </label>
              <label>Input file id
                <input id="batch-input-file-id" name="input_file_id" placeholder="file-..." required />
              </label>
              <label>Metadata (optional JSON object)
                <textarea name="metadata" placeholder='{"label":"nightly-import"}'></textarea>
              </label>
              <div class="banner warn">Batch creation expects an uploaded JSONL file in OpenAI batch input format.</div>
              <button type="submit">Create batch job</button>
            </form>`,
            "wide-panel span-4",
          )}
          ${card(
            "Inspector",
            `<div class="stack">
              <div class="banner">Select a file or batch to inspect metadata. Loading file content is separate so large JSONL payloads stay explicit.</div>
              <pre id="files-batches-detail">No selection yet.</pre>
              <pre id="files-batches-content">No file content loaded.</pre>
            </div>`,
            "wide-panel span-4",
          )}
          ${card(
            "Stored files",
            files.length
              ? `<table><thead><tr><th>File</th><th>Purpose</th><th>Size</th><th>Created</th><th>Actions</th></tr></thead><tbody>
                  ${files
                    .map(
                      (item) => `<tr>
                        <td><strong>${escapeHtml(item.filename || item.id)}</strong><br /><span class="muted">${escapeHtml(item.id)}</span></td>
                        <td>${escapeHtml(item.purpose || "user_data")}</td>
                        <td>${escapeHtml(formatBytes(item.bytes))}</td>
                        <td>${escapeHtml(formatTimestamp(item.created_at))}</td>
                        <td class="toolbar">
                          <button type="button" class="secondary" data-file-view="${escapeHtml(item.id)}">View</button>
                          <button type="button" class="secondary" data-file-use="${escapeHtml(item.id)}">Use for batch</button>
                          <button type="button" class="secondary" data-file-content="${escapeHtml(item.id)}">Content</button>
                          <button type="button" class="danger" data-file-delete="${escapeHtml(item.id)}">Delete</button>
                        </td>
                      </tr>`,
                    )
                    .join("")}</tbody></table>`
              : "<p>No files uploaded yet.</p>",
            "wide-panel span-6",
          )}
          ${card(
            "Batch jobs",
            batches.length
              ? `<table><thead><tr><th>Batch</th><th>Status</th><th>Endpoint</th><th>Output</th><th>Actions</th></tr></thead><tbody>
                  ${batches
                    .map(
                      (item) => `<tr>
                        <td><strong>${escapeHtml(item.id)}</strong><br /><span class="muted">${escapeHtml(item.input_file_id || "no input file")}</span></td>
                        <td>${escapeHtml(item.status || "unknown")}</td>
                        <td>${escapeHtml(item.endpoint || "n/a")}</td>
                        <td>${escapeHtml(item.output_file_id || "n/a")}</td>
                        <td class="toolbar">
                          <button type="button" class="secondary" data-batch-view="${escapeHtml(item.id)}">View</button>
                          <button type="button" class="secondary" ${item.output_file_id ? `data-batch-output="${escapeHtml(item.output_file_id)}"` : "disabled"}>Output</button>
                        </td>
                      </tr>`,
                    )
                    .join("")}</tbody></table>`
              : "<p>No batch jobs yet.</p>",
            "wide-panel span-6",
          )}
        `;

        const detailNode = document.getElementById("files-batches-detail");
        const contentNode = document.getElementById("files-batches-content");
        const batchInput = document.getElementById("batch-input-file-id");

        document.getElementById("refresh-files-batches").addEventListener("click", () => renderRoute("files-batches"));

        document.getElementById("files-upload-form").addEventListener("submit", async (event) => {
          event.preventDefault();
          const form = event.currentTarget;
          const upload = form.file.files[0];
          if (!upload) {
            pushAlert("Choose a file before uploading.", "warn");
            return;
          }
          const body = new FormData();
          body.set("purpose", form.purpose.value);
          body.set("file", upload, upload.name);
          const response = await gatewayJson("/v1/files", {
            method: "POST",
            body,
          });
          pushAlert(`Uploaded file ${response.id}.`, "info");
          renderRoute("files-batches");
        });

        document.getElementById("batch-create-form").addEventListener("submit", async (event) => {
          event.preventDefault();
          const form = event.currentTarget;
          const metadataText = form.metadata.value.trim();
          const metadata = metadataText ? safeJsonParse(metadataText, "__invalid__") : undefined;
          if (metadata === "__invalid__" || (metadata !== undefined && (metadata === null || Array.isArray(metadata) || typeof metadata !== "object"))) {
            pushAlert("Batch metadata must be a JSON object.", "danger");
            return;
          }
          const response = await gatewayJson("/v1/batches", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({
              endpoint: form.endpoint.value,
              input_file_id: form.input_file_id.value.trim(),
              completion_window: "24h",
              metadata,
            }),
          });
          pushAlert(`Created batch ${response.id} for ${response.endpoint}.`, "info");
          renderRoute("files-batches");
        });

        for (const button of pageContent.querySelectorAll("[data-file-view]")) {
          button.addEventListener("click", async () => {
            const fileId = button.getAttribute("data-file-view");
            const payload = await gatewayJson(`/v1/files/${encodeURIComponent(fileId)}`);
            detailNode.textContent = JSON.stringify(payload, null, 2);
          });
        }

        for (const button of pageContent.querySelectorAll("[data-file-use]")) {
          button.addEventListener("click", async () => {
            const fileId = button.getAttribute("data-file-use");
            batchInput.value = fileId;
            detailNode.textContent = `Selected ${fileId} as batch input.`;
            batchInput.focus();
          });
        }

        for (const button of pageContent.querySelectorAll("[data-file-content]")) {
          button.addEventListener("click", async () => {
            const fileId = button.getAttribute("data-file-content");
            contentNode.textContent = "Loading file content…";
            contentNode.textContent = await gatewayText(`/v1/files/${encodeURIComponent(fileId)}/content`);
          });
        }

        for (const button of pageContent.querySelectorAll("[data-file-delete]")) {
          button.addEventListener("click", async () => {
            const fileId = button.getAttribute("data-file-delete");
            await gatewayJson(`/v1/files/${encodeURIComponent(fileId)}`, {
              method: "DELETE",
            });
            pushAlert(`Deleted file ${fileId}.`, "info");
            renderRoute("files-batches");
          });
        }

        for (const button of pageContent.querySelectorAll("[data-batch-view]")) {
          button.addEventListener("click", async () => {
            const batchId = button.getAttribute("data-batch-view");
            const payload = await gatewayJson(`/v1/batches/${encodeURIComponent(batchId)}`);
            detailNode.textContent = JSON.stringify(payload, null, 2);
          });
        }

        for (const button of pageContent.querySelectorAll("[data-batch-output]")) {
          button.addEventListener("click", async () => {
            const fileId = button.getAttribute("data-batch-output");
            if (!fileId) {
              return;
            }
            contentNode.textContent = "Loading batch output…";
            contentNode.textContent = await gatewayText(`/v1/files/${encodeURIComponent(fileId)}/content`);
          });
        }
      }

      async function renderTraffic() {
        const [requests, errors, usageKeys, usageProviders] = await Promise.all([
          apiFetch("/admin/api/requests/recent?limit=20"),
          apiFetch("/admin/api/errors/recent?limit=20"),
          apiFetch("/admin/api/usage/keys"),
          apiFetch("/admin/api/usage/providers"),
        ]);
        heroActions.innerHTML = `<a href="/admin/logs"><button class="secondary">Open logs</button></a>`;
        pageContent.innerHTML = `
          ${card("Recent requests", `<pre>${escapeHtml(JSON.stringify(requests.events || [], null, 2))}</pre>`, "wide-panel span-6")}
          ${card("Recent errors", `<pre>${escapeHtml(JSON.stringify(errors.events || [], null, 2))}</pre>`, "wide-panel span-6")}
          ${card("Usage by key", `<pre>${escapeHtml(JSON.stringify(usageKeys.entries || [], null, 2))}</pre>`, "wide-panel span-6")}
          ${card("Usage by provider", `<pre>${escapeHtml(JSON.stringify(usageProviders.entries || [], null, 2))}</pre>`, "wide-panel span-6")}
        `;
      }

      async function renderProviders() {
        const [capabilities, routes] = await Promise.all([
          apiFetch("/admin/api/capabilities"),
          apiFetch("/admin/api/routes"),
        ]);
        heroActions.innerHTML = `<a href="/admin/system"><button class="secondary">Open system</button></a>`;
        pageContent.innerHTML = `
          ${card("Capability matrix", `<pre>${escapeHtml(JSON.stringify(capabilities.matrix, null, 2))}</pre>`, "wide-panel span-6")}
          ${card("Provider detail", `<pre>${escapeHtml(JSON.stringify(capabilities.providers, null, 2))}</pre>`, "wide-panel span-6")}
          ${card("Mounted routes", `<pre>${escapeHtml(JSON.stringify(routes.routes || [], null, 2))}</pre>`, "wide-panel span-12")}
        `;
      }

      async function renderSystem() {
        const [runtime, config, routes, setup] = await Promise.all([
          apiFetch("/admin/api/runtime"),
          apiFetch("/admin/api/config"),
          apiFetch("/admin/api/routes"),
          apiFetch("/admin/api/setup"),
        ]);
        heroActions.innerHTML = `<button class="secondary" id="copy-diagnostics">Copy diagnostics JSON</button>`;
        const diagnostics = { runtime, config, routes, setup };
        pageContent.innerHTML = `
          ${card("Setup", `<pre>${escapeHtml(JSON.stringify(setup, null, 2))}</pre>`, "wide-panel span-4")}
          ${card("Runtime", `<pre>${escapeHtml(JSON.stringify(runtime, null, 2))}</pre>`, "wide-panel span-4")}
          ${card("Config", `<pre>${escapeHtml(JSON.stringify(config, null, 2))}</pre>`, "wide-panel span-4")}
          ${card("Routes", `<pre>${escapeHtml(JSON.stringify(routes.routes || [], null, 2))}</pre>`, "wide-panel span-12")}
        `;
        document.getElementById("copy-diagnostics").addEventListener("click", async () => {
          await navigator.clipboard.writeText(JSON.stringify(diagnostics, null, 2));
          pushAlert("Diagnostics copied to clipboard.");
        });
      }

      async function renderRoute(page = currentPage()) {
        clearAlerts();
        setHero(page);
        setNav(page);
        heroActions.innerHTML = "";
        pageContent.innerHTML = "";
        await loadGlobalStatus();
        try {
          if (page === "overview") return renderOverview();
          if (page === "setup") return renderSetup();
          if (page === "settings") return renderSettings();
          if (page === "keys") return renderKeys();
          if (page === "logs") return renderLogs();
          if (page === "playground") return renderPlayground();
          if (page === "traffic") return renderTraffic();
          if (page === "providers") return renderProviders();
          if (page === "files-batches") return renderFilesBatches();
          return renderSystem();
        } catch (error) {
          pageContent.innerHTML = card(
            "Request failed",
            `<pre>${escapeHtml(error.message)}</pre>`,
            "wide-panel span-12",
          );
          pushAlert("The current page failed to load. Check your admin API key or recent logs.", "danger");
        }
      }

      renderRoute();
    </script>
  </body>
</html>
